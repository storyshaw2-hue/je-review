<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.77.0/build/stlite.js";
const files = {
  "app.py": "from jereview.webapp import render\nrender(allow_ai=False)  # in-browser build: no network egress\n",
  "jereview/__init__.py": "\"\"\"jereview \u2014 local, privacy-preserving journal-entry risk testing for internal audit.\"\"\"\n\nfrom .schema import ColumnMapping, normalize, NormalizationError\nfrom .rules import RULES, RuleContext\nfrom .engine import run, RunResult\n\n__all__ = [\n    \"ColumnMapping\", \"normalize\", \"NormalizationError\",\n    \"RULES\", \"RuleContext\", \"run\", \"RunResult\",\n]\n__version__ = \"0.1.0\"\n",
  "jereview/schema.py": "\"\"\"\nschema.py \u2014 Canonical journal-entry schema, column mapping, and normalization.\n\nA company's GL export rarely matches our field names (SAP, Oracle, NetSuite,\nQuickBooks all differ). The mapping layer translates their columns into a\ncanonical line-level frame inspired by the AICPA Audit Data Standard for\njournal entries. Rules then run against the canonical names, so the engine\nnever has to know about a specific ERP.\n\nCanonical line-level fields (one row per debit/credit line):\n    je_id           journal entry / document number (groups lines)   [required]\n    line_no         line number within the entry                     [optional]\n    entry_date      date the entry was recorded/posted               [required]\n    effective_date  accounting/period date the entry affects         [optional]\n    period          period label, e.g. \"2024-11\" (derived if absent) [optional]\n    posted_at       full posting timestamp (for off-hours test)      [optional]\n    account         GL account number                                [required]\n    account_name    GL account description                           [optional]\n    description     line/header narrative                            [optional]\n    amount          signed amount (debit +, credit -)                [required*]\n    debit           debit amount                                     [required*]\n    credit          credit amount                                    [required*]\n    entered_by      preparer / user who posted                       [optional]\n    approved_by     approver                                         [optional]\n    source          'Manual' / 'System' / 'Auto' / etc.              [optional]\n\n  *Provide EITHER `amount` OR both `debit`/`credit`. The normalizer derives\n   whichever is missing.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nfrom dataclasses import dataclass\nfrom pathlib import Path\n\nimport pandas as pd\n\nCANONICAL_FIELDS = [\n    \"je_id\", \"line_no\", \"entry_date\", \"effective_date\", \"period\", \"posted_at\",\n    \"account\", \"account_name\", \"description\", \"amount\", \"debit\", \"credit\",\n    \"entered_by\", \"approved_by\", \"source\",\n]\n\nREQUIRED_FIELDS = [\"je_id\", \"entry_date\", \"account\"]\n\n\ndef _clean_numeric(s: pd.Series) -> pd.Series:\n    \"\"\"Coerce a possibly-messy money column to float: handles $/\u00a3/\u20ac, thousands\n    separators, whitespace, and parenthesised negatives like '(1,234.56)'.\"\"\"\n    if pd.api.types.is_numeric_dtype(s):\n        return pd.to_numeric(s, errors=\"coerce\")\n    t = s.astype(\"string\").str.strip()\n    neg = (t.str.startswith(\"(\") & t.str.endswith(\")\")).fillna(False)\n    t = t.str.replace(r\"^\\((.*)\\)$\", r\"\\1\", regex=True)\n    t = t.str.replace(\",\", \"\", regex=False)\n    t = t.str.replace(r\"[^0-9.\\-]\", \"\", regex=True)\n    t = t.replace({\"\": pd.NA, \"-\": pd.NA, \".\": pd.NA})\n    num = pd.to_numeric(t, errors=\"coerce\")\n    return num.where(~neg, -num.abs())\n\n\ndef _to_datetime(s: pd.Series) -> pd.Series:\n    \"\"\"Parse dates tolerantly across mixed formats.\"\"\"\n    try:\n        return pd.to_datetime(s, errors=\"coerce\", format=\"mixed\")\n    except (ValueError, TypeError):\n        return pd.to_datetime(s, errors=\"coerce\")\n\n\n@dataclass\nclass ColumnMapping:\n    \"\"\"Maps canonical field name -> source column name in the export.\"\"\"\n    mapping: dict\n\n    @classmethod\n    def from_file(cls, path: str | Path) -> \"ColumnMapping\":\n        data = json.loads(Path(path).read_text(encoding=\"utf-8\"))\n        # allow either {\"mapping\": {...}} or a bare {...}\n        return cls(mapping=data.get(\"mapping\", data))\n\n    @classmethod\n    def identity(cls, columns: list[str]) -> \"ColumnMapping\":\n        \"\"\"Assume the export already uses canonical names (for our sample data).\"\"\"\n        cols = [str(c).strip() for c in columns]\n        return cls(mapping={c: c for c in CANONICAL_FIELDS if c in cols})\n\n\nclass NormalizationError(ValueError):\n    pass\n\n\ndef normalize(df_raw: pd.DataFrame, mapping: ColumnMapping) -> pd.DataFrame:\n    \"\"\"\n    Translate a raw export into the canonical line-level frame.\n\n    Missing OPTIONAL fields are added as empty columns so rules can detect\n    their absence and skip gracefully. Missing REQUIRED fields raise.\n    \"\"\"\n    df_raw = df_raw.rename(columns=lambda c: str(c).strip())\n    inv = {str(src).strip(): canon for canon, src in mapping.mapping.items()}\n    df = df_raw.rename(columns=inv).copy()\n    df = df.dropna(how=\"all\")            # drop fully-blank rows some exports include\n\n    missing_required = [f for f in REQUIRED_FIELDS if f not in df.columns]\n    if missing_required:\n        raise NormalizationError(\n            f\"Required field(s) not mapped: {missing_required}. \"\n            f\"Fix your mapping file. Available source columns: {list(df_raw.columns)}\"\n        )\n\n    # amount vs debit/credit reconciliation\n    has_amount = \"amount\" in df.columns\n    has_dc = \"debit\" in df.columns and \"credit\" in df.columns\n    if not has_amount and not has_dc:\n        raise NormalizationError(\n            \"Provide either an `amount` column or both `debit` and `credit`.\"\n        )\n    if not has_amount:\n        df[\"amount\"] = _clean_numeric(df[\"debit\"]).fillna(0) - _clean_numeric(df[\"credit\"]).fillna(0)\n    else:\n        df[\"amount\"] = _clean_numeric(df[\"amount\"])\n    if not has_dc:\n        amt = df[\"amount\"]\n        df[\"debit\"] = amt.clip(lower=0)\n        df[\"credit\"] = (-amt).clip(lower=0)\n    else:\n        df[\"debit\"] = _clean_numeric(df[\"debit\"]).fillna(0)\n        df[\"credit\"] = _clean_numeric(df[\"credit\"]).fillna(0)\n\n    # add any absent optional fields as empty so rule guards work uniformly\n    for f in CANONICAL_FIELDS:\n        if f not in df.columns:\n            df[f] = pd.NA\n\n    # types\n    for dcol in [\"entry_date\", \"effective_date\", \"posted_at\"]:\n        df[dcol] = _to_datetime(df[dcol])\n    df[\"account\"] = df[\"account\"].astype(\"string\").str.strip()\n    df[\"je_id\"] = df[\"je_id\"].astype(\"string\").str.strip()\n    df = df[df[\"je_id\"].notna() & (df[\"je_id\"].str.len() > 0)]\n    for tcol in [\"account_name\", \"description\", \"entered_by\", \"approved_by\", \"source\"]:\n        df[tcol] = df[tcol].astype(\"string\")\n\n    # derive period from effective_date (fallback entry_date) if absent/empty\n    base_date = df[\"effective_date\"].fillna(df[\"entry_date\"])\n    derived_period = base_date.dt.to_period(\"M\").astype(\"string\")\n    df[\"period\"] = df[\"period\"].astype(\"string\")\n    df[\"period\"] = df[\"period\"].where(df[\"period\"].notna() & (df[\"period\"].str.len() > 0), derived_period)\n\n    return df[CANONICAL_FIELDS].reset_index(drop=True)\n\n\ndef available_fields(df: pd.DataFrame) -> set[str]:\n    \"\"\"Canonical fields that are actually populated (not all-null).\"\"\"\n    return {c for c in df.columns if df[c].notna().any()}\n",
  "jereview/rules.py": "\"\"\"\nrules.py \u2014 The journal-entry risk test library.\n\nEach rule is registered with @rule and receives the normalized line-level\nDataFrame plus a RuleContext (config + which fields are available). It returns\na dict: {je_id: reason_string} for every entry it flags.\n\nRules are *risk indicators*, not conclusions. A flagged entry is an item for\nauditor judgment; expect false positives. Weights drive a composite risk score\nused only to rank items for triage.\n\nAdding a rule = write a function and decorate it. Nothing else to wire.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport pandas as pd\n\n# ---------------------------------------------------------------------------\n# Registry\n# ---------------------------------------------------------------------------\n\nRULES: list[\"Rule\"] = []\n\n\n@dataclass\nclass Rule:\n    id: str\n    label: str\n    scope: str          # 'entry' or 'line' (informational)\n    weight: int         # contribution to composite risk score\n    requires: list      # canonical fields needed; rule skipped if any missing\n    description: str\n    func: object\n\n    def runnable(self, available: set) -> bool:\n        return all(f in available for f in self.requires)\n\n\ndef rule(id, label, scope, weight, requires, description):\n    def deco(fn):\n        RULES.append(Rule(id, label, scope, weight, list(requires), description, fn))\n        return fn\n    return deco\n\n\n@dataclass\nclass RuleContext:\n    available: set\n    # tunable thresholds (override via config)\n    approval_threshold: float = 50_000.0\n    below_threshold_band: float = 0.05      # within 5% under the threshold\n    round_amount_min: float = 1_000.0       # only flag round amounts >= this\n    seldom_account_max_entries: int = 1     # account used in <= N distinct entries\n    large_outlier_pct: float = 0.99         # top 1% of |line amount|\n    offhours_start: int = 20                # 8pm\n    offhours_end: int = 6                   # 6am\n    period_end_days: int = 3                # last N calendar days of the month\n    materiality_floor: float = 0.0          # ignore amounts below this for outliers\n    reversal_window_days: int = 5           # quick-reversal look-around window (days)\n    rare_user_max_entries: int = 2          # user posting <= N entries counts as \"rare\"\n    sensitive_account_keywords: list = field(default_factory=lambda: [\n        \"suspense\", \"clearing\", \"reserve\", \"accrual\", \"equity\", \"revenue\",\n        \"intercompany\", \"ic \", \"related party\", \"goodwill\", \"impairment\",\n        \"deferred\", \"provision\", \"writeoff\", \"write-off\", \"topside\", \"top-side\",\n    ])\n    suspicious_keywords: list = field(default_factory=lambda: [\n        \"plug\", \"to balance\", \"balancing\", \"reclass\", \"temp\", \"temporary\",\n        \"misc\", \"miscellaneous\", \"correction\", \"adjust to\", \"true up\", \"true-up\",\n        \"do not\", \"dummy\", \"reverse later\", \"write off to\", \"force\",\n        \"per cfo\", \"per ceo\", \"per management\", \"per verbal\", \"as discussed\",\n    ])\n\n\n# ---------------------------------------------------------------------------\n# Helpers\n# ---------------------------------------------------------------------------\n\ndef _entry_dates(df: pd.DataFrame) -> pd.Series:\n    \"\"\"One entry_date per je_id (first non-null).\"\"\"\n    return df.groupby(\"je_id\")[\"entry_date\"].first()\n\n\n# ---------------------------------------------------------------------------\n# TIMING rules\n# ---------------------------------------------------------------------------\n\n@rule(\"WEEKEND_POSTING\", \"Posted on a weekend\", \"entry\", 2, [\"entry_date\"],\n      \"Entry recorded on a Saturday or Sunday \u2014 outside normal close cadence.\")\ndef r_weekend(df, ctx):\n    ed = _entry_dates(df).dropna()\n    flagged = ed[ed.dt.dayofweek >= 5]\n    return {je: f\"Posted on {d:%A %Y-%m-%d}\" for je, d in flagged.items()}\n\n\n@rule(\"AFTER_PERIOD_END\", \"Posted after the period it affects\", \"entry\", 3,\n      [\"entry_date\", \"period\"],\n      \"Entry recorded after the close of the accounting period (possible back-dating).\")\ndef r_after_period(df, ctx):\n    out = {}\n    g = df.groupby(\"je_id\").agg(entry_date=(\"entry_date\", \"first\"),\n                                period=(\"period\", \"first\"))\n    for je, row in g.iterrows():\n        try:\n            pend = pd.Period(row[\"period\"], freq=\"M\").end_time\n        except Exception:\n            continue\n        ed = row[\"entry_date\"]\n        if pd.notna(ed) and pd.notna(pend) and ed.normalize() > pend.normalize():\n            out[je] = f\"Period {row['period']} but posted {ed:%Y-%m-%d}\"\n    return out\n\n\n@rule(\"PERIOD_END_CONCENTRATION\", \"Posted in the last days of the period\", \"entry\", 1,\n      [\"entry_date\"],\n      \"Entry recorded in the final days of the month \u2014 period-end pressure window.\")\ndef r_period_end(df, ctx):\n    ed = _entry_dates(df).dropna()\n    days_in_month = ed.dt.daysinmonth\n    flagged = ed[ed.dt.day > (days_in_month - ctx.period_end_days)]\n    return {je: f\"Posted {d:%Y-%m-%d} (last {ctx.period_end_days} days of month)\"\n            for je, d in flagged.items()}\n\n\n@rule(\"OFFHOURS_POSTING\", \"Posted outside business hours\", \"entry\", 1, [\"posted_at\"],\n      \"Entry timestamp is late night/early morning \u2014 unusual posting time.\")\ndef r_offhours(df, ctx):\n    ts = df.groupby(\"je_id\")[\"posted_at\"].first().dropna()\n    hours = ts.dt.hour\n    flagged = ts[(hours >= ctx.offhours_start) | (hours < ctx.offhours_end)]\n    return {je: f\"Posted at {t:%H:%M}\" for je, t in flagged.items()}\n\n\n# ---------------------------------------------------------------------------\n# AMOUNT rules (line-level, rolled up to the entry)\n# ---------------------------------------------------------------------------\n\n@rule(\"ROUND_AMOUNT\", \"Round-dollar amount\", \"line\", 1, [\"amount\"],\n      \"A line amount is an exact multiple of 1,000 \u2014 often estimates or plugs.\")\ndef r_round(df, ctx):\n    amt = df[\"amount\"].abs()\n    mask = (amt >= ctx.round_amount_min) & (amt % 1000 == 0)\n    out = {}\n    for je, sub in df[mask].groupby(\"je_id\"):\n        v = sub[\"amount\"].abs().max()\n        out[je] = f\"Round amount ${v:,.0f}\"\n    return out\n\n\n@rule(\"BELOW_THRESHOLD\", \"Just below an approval threshold\", \"line\", 2, [\"amount\"],\n      \"A line amount sits just under a known approval limit \u2014 possible threshold gaming.\")\ndef r_below_threshold(df, ctx):\n    lo = ctx.approval_threshold * (1 - ctx.below_threshold_band)\n    hi = ctx.approval_threshold\n    amt = df[\"amount\"].abs()\n    mask = (amt >= lo) & (amt < hi)\n    out = {}\n    for je, sub in df[mask].groupby(\"je_id\"):\n        v = sub[\"amount\"].abs().max()\n        out[je] = f\"${v:,.0f} is within {ctx.below_threshold_band:.0%} under the ${hi:,.0f} approval limit\"\n    return out\n\n\n@rule(\"LARGE_OUTLIER\", \"Unusually large amount\", \"line\", 1, [\"amount\"],\n      \"A line amount is in the top percentile of the population.\")\ndef r_outlier(df, ctx):\n    amt = df[\"amount\"].abs()\n    pool = amt[amt >= ctx.materiality_floor]\n    if pool.empty:\n        return {}\n    cutoff = pool.quantile(ctx.large_outlier_pct)\n    mask = amt >= cutoff\n    out = {}\n    for je, sub in df[mask].groupby(\"je_id\"):\n        v = sub[\"amount\"].abs().max()\n        out[je] = f\"Large amount ${v:,.0f} (top {1-ctx.large_outlier_pct:.0%})\"\n    return out\n\n\n# ---------------------------------------------------------------------------\n# ACCOUNT rules\n# ---------------------------------------------------------------------------\n\n@rule(\"SELDOM_ACCOUNT\", \"Seldom-used account\", \"line\", 2, [\"account\"],\n      \"An account touched by only one entry in the period \u2014 rarely-used accounts carry higher risk.\")\ndef r_seldom(df, ctx):\n    counts = df.groupby(\"account\")[\"je_id\"].nunique()\n    rare = set(counts[counts <= ctx.seldom_account_max_entries].index)\n    out = {}\n    for je, sub in df[df[\"account\"].isin(rare)].groupby(\"je_id\"):\n        accts = \", \".join(sorted(set(sub[\"account\"].dropna())))\n        out[je] = f\"Seldom-used account(s): {accts}\"\n    return out\n\n\n@rule(\"SENSITIVE_ACCOUNT\", \"Sensitive account\", \"line\", 1, [\"account_name\"],\n      \"A line hits a higher-risk account class (suspense, reserve, equity, revenue, IC, etc.).\")\ndef r_sensitive(df, ctx):\n    names = df[\"account_name\"].fillna(\"\").str.lower()\n    kw = ctx.sensitive_account_keywords\n    mask = names.apply(lambda s: any(k in s for k in kw))\n    out = {}\n    for je, sub in df[mask].groupby(\"je_id\"):\n        hit = sub.loc[mask.loc[sub.index], \"account_name\"].dropna().iloc[0]\n        out[je] = f\"Sensitive account: {hit}\"\n    return out\n\n\n# ---------------------------------------------------------------------------\n# USER / SOURCE rules\n# ---------------------------------------------------------------------------\n\n@rule(\"MANUAL_SOURCE\", \"Manual entry\", \"entry\", 1, [\"source\"],\n      \"Entry was posted manually rather than system-generated.\")\ndef r_manual(df, ctx):\n    src = df.groupby(\"je_id\")[\"source\"].first().fillna(\"\").str.lower()\n    flagged = src[src.str.contains(\"manual\")]\n    return {je: \"Manual entry\" for je in flagged.index}\n\n\n@rule(\"SOD_CONFLICT\", \"Preparer is also approver\", \"entry\", 3,\n      [\"entered_by\", \"approved_by\"],\n      \"Same user prepared and approved the entry \u2014 segregation-of-duties conflict.\")\ndef r_sod(df, ctx):\n    g = df.groupby(\"je_id\").agg(p=(\"entered_by\", \"first\"), a=(\"approved_by\", \"first\"))\n    out = {}\n    for je, row in g.iterrows():\n        p, a = row[\"p\"], row[\"a\"]\n        if pd.notna(p) and pd.notna(a) and str(p).strip() and str(p).strip() == str(a).strip():\n            out[je] = f\"Preparer = approver ({p})\"\n    return out\n\n\n# ---------------------------------------------------------------------------\n# TEXT rules\n# ---------------------------------------------------------------------------\n\n@rule(\"BLANK_DESCRIPTION\", \"Missing description\", \"entry\", 2, [\"description\"],\n      \"Entry has no narrative \u2014 undocumented entries are harder to substantiate.\")\ndef r_blank(df, ctx):\n    desc = df.groupby(\"je_id\")[\"description\"].apply(\n        lambda s: \"\".join([str(x) for x in s.dropna()]).strip())\n    flagged = desc[desc.str.len() == 0]\n    return {je: \"No description provided\" for je in flagged.index}\n\n\n@rule(\"SUSPICIOUS_KEYWORD\", \"Suspicious description keyword\", \"line\", 2, [\"description\"],\n      \"Description contains a flag word (plug, to balance, reclass, misc, correction, etc.).\")\ndef r_keyword(df, ctx):\n    import re\n    desc = df[\"description\"].fillna(\"\").str.lower()\n    pattern = re.compile(r\"\\b(\" + \"|\".join(re.escape(k) for k in ctx.suspicious_keywords) + r\")\\b\")\n    def hit(s):\n        m = pattern.search(s)\n        return m.group(1) if m else None\n    hits = desc.apply(hit)\n    mask = hits.notna()\n    out = {}\n    for je, sub in df[mask].groupby(\"je_id\"):\n        k = hits.loc[sub.index].dropna().iloc[0]\n        out[je] = f\"Description contains '{k.strip()}'\"\n    return out\n\n\n# ---------------------------------------------------------------------------\n# STRUCTURAL rules\n# ---------------------------------------------------------------------------\n\n@rule(\"UNBALANCED_ENTRY\", \"Entry does not balance\", \"entry\", 3, [\"amount\"],\n      \"Signed line amounts for the entry do not net to zero \u2014 debits \u2260 credits.\")\ndef r_unbalanced(df, ctx):\n    net = df.groupby(\"je_id\")[\"amount\"].sum().round(2)\n    flagged = net[net.abs() > 0.005]\n    return {je: f\"Out of balance by ${v:,.2f}\" for je, v in flagged.items()}\n\n\n# ---------------------------------------------------------------------------\n# CROSS-ENTRY / POPULATION rules\n# (these compare entries against each other, not just within one entry)\n# ---------------------------------------------------------------------------\n\ndef _entry_signature(sub: pd.DataFrame) -> tuple:\n    \"\"\"A normalized (account, signed-amount) fingerprint for an entry's lines.\"\"\"\n    return tuple(sorted(\n        (str(a), round(float(v), 2))\n        for a, v in zip(sub[\"account\"].fillna(\"\"), sub[\"amount\"].fillna(0.0))\n    ))\n\n\n@rule(\"DUPLICATE_ENTRY\", \"Possible duplicate entry\", \"entry\", 3, [\"account\", \"amount\"],\n      \"Another entry posts the identical set of account/amount lines \u2014 possible duplicate \"\n      \"posting or double-paid invoice.\")\ndef r_duplicate(df, ctx):\n    from collections import defaultdict\n    groups = defaultdict(list)\n    for je, sub in df.groupby(\"je_id\"):\n        sig = _entry_signature(sub)\n        if sig and any(v != 0 for _, v in sig):\n            groups[sig].append(je)\n    out = {}\n    for jes in groups.values():\n        if len(jes) > 1:\n            for je in jes:\n                others = [x for x in jes if x != je]\n                shown = \", \".join(sorted(others)[:3]) + (\"\u2026\" if len(others) > 3 else \"\")\n                n = len(others)\n                out[je] = f\"Identical account/amount lines to {n} other entr{'y' if n == 1 else 'ies'}: {shown}\"\n    return out\n\n\n@rule(\"QUICK_REVERSAL\", \"Reversed shortly after posting\", \"entry\", 2,\n      [\"entry_date\", \"account\", \"amount\"],\n      \"An equal-and-opposite entry posts within a few days \u2014 possible window-dressing or a \"\n      \"temporary booking that was backed out.\")\ndef r_quick_reversal(df, ctx):\n    from collections import defaultdict\n    per = {}\n    for je, sub in df.groupby(\"je_id\"):\n        sig = _entry_signature(sub)\n        d = sub[\"entry_date\"].dropna()\n        per[je] = (sig, d.iloc[0] if len(d) else pd.NaT)\n    by_sig = defaultdict(list)\n    for je, (sig, d) in per.items():\n        if sig:\n            by_sig[sig].append((je, d))\n    out = {}\n    for je, (sig, d) in per.items():\n        if not sig or pd.isna(d) or not any(v != 0 for _, v in sig):\n            continue\n        neg = tuple(sorted((a, round(-v, 2)) for a, v in sig))\n        if neg == sig:\n            continue\n        for je2, d2 in by_sig.get(neg, []):\n            if je2 == je or pd.isna(d2):\n                continue\n            delta = abs((d2 - d).days)\n            if delta <= ctx.reversal_window_days:\n                out[je] = f\"Equal-and-opposite to {je2} ({delta} day(s) apart)\"\n                break\n    return out\n\n\n@rule(\"NUMBERING_GAP\", \"Gap in entry numbering\", \"entry\", 1, [\"je_id\"],\n      \"A break in the journal-entry number sequence precedes this entry \u2014 possible deleted, \"\n      \"voided, or unrecorded entries.\")\ndef r_numbering_gap(df, ctx):\n    import re\n    from collections import defaultdict\n    pat = re.compile(r\"^(.*?)(\\d+)\\s*$\")\n    byprefix = defaultdict(set)\n    for x in df[\"je_id\"].dropna().astype(str).unique():\n        m = pat.match(x.strip())\n        if m:\n            byprefix[m.group(1)].add((int(m.group(2)), x.strip()))\n    out = {}\n    for items in byprefix.values():\n        items = sorted(items)\n        if len(items) < 5:                       # need a real sequence to judge\n            continue\n        nums = [n for n, _ in items]\n        span = nums[-1] - nums[0] + 1\n        if span <= 0 or len(nums) / span < 0.7:  # only when mostly contiguous\n            continue\n        for i in range(1, len(items)):\n            prev, cur = items[i - 1][0], items[i][0]\n            if cur - prev > 1:\n                missing = cur - prev - 1\n                out[items[i][1]] = (f\"{missing} entry number(s) missing before this entry \"\n                                    f\"(\u2026{prev} \u2192 \u2026{cur})\")\n    return out\n\n\n@rule(\"RARE_USER\", \"Posted by an infrequent user\", \"entry\", 2, [\"entered_by\"],\n      \"Entry was posted by a user who rarely posts journal entries in this population \u2014 \"\n      \"unfamiliar preparers warrant a closer look.\")\ndef r_rare_user(df, ctx):\n    by = df.groupby(\"je_id\")[\"entered_by\"].first().dropna()\n    by = by[by.astype(str).str.strip() != \"\"]\n    if by.empty:\n        return {}\n    counts = by.value_counts()\n    rare_users = set(counts[counts <= ctx.rare_user_max_entries].index)\n    rare_entries = by[by.isin(rare_users)]\n    # guard: if \"rare\" users are actually a large share, the signal is meaningless\n    if len(rare_entries) > 0.20 * len(by):\n        return {}\n    out = {}\n    for je, u in rare_entries.items():\n        c = int(counts[u])\n        out[je] = f\"Posted by infrequent user '{u}' ({c} entr{'y' if c == 1 else 'ies'} in file)\"\n    return out\n",
  "jereview/engine.py": "\"\"\"\nengine.py \u2014 Run the rule library over a normalized JE frame and aggregate\nper-entry findings, a composite risk score, and population diagnostics.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass, field\n\nimport numpy as np\nimport pandas as pd\n\nfrom .rules import RULES, RuleContext\nfrom .schema import available_fields\n\n\n@dataclass\nclass RunResult:\n    entries: pd.DataFrame          # one row per flagged entry, ranked by risk_score\n    rule_summary: pd.DataFrame     # per-rule counts + whether it ran\n    benford: dict                  # first-digit diagnostic\n    stats: dict                    # population stats\n    skipped_rules: list = field(default_factory=list)\n\n\ndef _benford(amounts: pd.Series) -> dict:\n    \"\"\"First-digit Benford diagnostic (population-level). Returns MAD + verdict.\"\"\"\n    a = amounts.abs()\n    a = a[a >= 1]\n    lead = a.astype(str).str.replace(\".\", \"\", regex=False).str.lstrip(\"0\").str[:1]\n    lead = pd.to_numeric(lead, errors=\"coerce\").dropna()\n    lead = lead[(lead >= 1) & (lead <= 9)]\n    n = len(lead)\n    if n < 50:\n        return {\"n\": n, \"mad\": None, \"verdict\": \"Too few amounts for a reliable Benford read\"}\n    observed = lead.value_counts(normalize=True).reindex(range(1, 10), fill_value=0.0)\n    expected = pd.Series({d: np.log10(1 + 1 / d) for d in range(1, 10)})\n    mad = float((observed - expected).abs().mean())\n    # Nigrini's conformity bands for first-digit MAD\n    if mad < 0.006:\n        verdict = \"Close conformity\"\n    elif mad < 0.012:\n        verdict = \"Acceptable conformity\"\n    elif mad < 0.015:\n        verdict = \"Marginal conformity\"\n    else:\n        verdict = \"Nonconformity \u2014 investigate\"\n    return {\"n\": n, \"mad\": round(mad, 5), \"verdict\": verdict,\n            \"observed\": observed.round(4).to_dict(), \"expected\": expected.round(4).to_dict()}\n\n\ndef run(df: pd.DataFrame, ctx: RuleContext | None = None) -> RunResult:\n    available = available_fields(df)\n    ctx = ctx or RuleContext(available=available)\n    ctx.available = available\n\n    # per-entry accumulation\n    reasons: dict[str, list[str]] = {}\n    tests: dict[str, list[str]] = {}\n    score: dict[str, int] = {}\n    rule_rows = []\n    skipped = []\n\n    for r in RULES:\n        if not r.runnable(available):\n            skipped.append(r.id)\n            rule_rows.append({\"rule_id\": r.id, \"label\": r.label, \"weight\": r.weight,\n                              \"ran\": False, \"entries_flagged\": 0,\n                              \"requires\": \",\".join(r.requires), \"description\": r.description})\n            continue\n        hits = r.func(df, ctx) or {}\n        for je, reason in hits.items():\n            reasons.setdefault(je, []).append(f\"[{r.id}] {reason}\")\n            tests.setdefault(je, []).append(r.id)\n            score[je] = score.get(je, 0) + r.weight\n        rule_rows.append({\"rule_id\": r.id, \"label\": r.label, \"weight\": r.weight,\n                          \"ran\": True, \"entries_flagged\": len(hits),\n                          \"requires\": \",\".join(r.requires), \"description\": r.description})\n\n    # entry-level rollup of identity fields\n    agg = df.groupby(\"je_id\").agg(\n        entry_date=(\"entry_date\", \"first\"),\n        period=(\"period\", \"first\"),\n        entered_by=(\"entered_by\", \"first\"),\n        approved_by=(\"approved_by\", \"first\"),\n        source=(\"source\", \"first\"),\n        lines=(\"account\", \"size\"),\n        total_debit=(\"debit\", \"sum\"),\n        total_credit=(\"credit\", \"sum\"),\n        net_amount=(\"amount\", \"sum\"),\n        description=(\"description\", lambda s: \" | \".join(sorted({str(x) for x in s.dropna() if str(x).strip()}))),\n    )\n\n    rows = []\n    for je in score:\n        a = agg.loc[je]\n        rows.append({\n            \"je_id\": je,\n            \"risk_score\": score[je],\n            \"tests_fired\": len(tests[je]),\n            \"test_ids\": \", \".join(tests[je]),\n            \"reasons\": \" ; \".join(reasons[je]),\n            \"entry_date\": a[\"entry_date\"],\n            \"period\": a[\"period\"],\n            \"lines\": int(a[\"lines\"]),\n            \"total_debit\": round(float(a[\"total_debit\"]), 2),\n            \"total_credit\": round(float(a[\"total_credit\"]), 2),\n            \"net_amount\": round(float(a[\"net_amount\"]), 2),\n            \"entered_by\": a[\"entered_by\"],\n            \"approved_by\": a[\"approved_by\"],\n            \"source\": a[\"source\"],\n            \"description\": a[\"description\"],\n        })\n    entries = pd.DataFrame(rows)\n    if not entries.empty:\n        entries = entries.sort_values([\"risk_score\", \"tests_fired\"], ascending=False).reset_index(drop=True)\n\n    stats = {\n        \"total_entries\": int(df[\"je_id\"].nunique()),\n        \"total_lines\": int(len(df)),\n        \"flagged_entries\": int(len(entries)),\n        \"flagged_pct\": round(100 * len(entries) / max(df[\"je_id\"].nunique(), 1), 1),\n        \"periods\": \", \".join(sorted(set(df[\"period\"].dropna()))),\n    }\n    return RunResult(\n        entries=entries,\n        rule_summary=pd.DataFrame(rule_rows),\n        benford=_benford(df[\"amount\"]),\n        stats=stats,\n        skipped_rules=skipped,\n    )\n",
  "jereview/report.py": "\"\"\"\nreport.py \u2014 Write the exceptions workpaper.\n\nExcel workbook with three sheets:\n  Summary     \u2014 run metadata, per-test counts, Benford diagnostic, disclaimer\n  Exceptions  \u2014 one row per flagged entry, ranked by risk score (auto-filter,\n                frozen header, colour scale on score)\n  Test Catalog\u2014 every rule, its weight, what it needs, whether it ran\n\nAlso writes a flat CSV of the Exceptions sheet for downstream analysis.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom datetime import datetime\nfrom pathlib import Path\n\nimport pandas as pd\nfrom openpyxl import Workbook\nfrom openpyxl.styles import Alignment, Font, PatternFill\nfrom openpyxl.formatting.rule import ColorScaleRule\nfrom openpyxl.utils import get_column_letter\n\nfrom .engine import RunResult\n\nFONT = \"Arial\"\nHEAD_FILL = PatternFill(\"solid\", fgColor=\"1F3864\")\nHEAD_FONT = Font(name=FONT, bold=True, color=\"FFFFFF\", size=11)\nTITLE_FONT = Font(name=FONT, bold=True, size=14, color=\"1F3864\")\nNOTE_FONT = Font(name=FONT, italic=True, size=9, color=\"595959\")\nBASE_FONT = Font(name=FONT, size=10)\n\n\ndef _style_header(ws, row, ncols):\n    for c in range(1, ncols + 1):\n        cell = ws.cell(row=row, column=c)\n        cell.fill = HEAD_FILL\n        cell.font = HEAD_FONT\n        cell.alignment = Alignment(vertical=\"center\", wrap_text=True)\n\n\ndef _autofit(ws, df, start_row, widths=None):\n    for i, col in enumerate(df.columns, start=1):\n        if widths and col in widths:\n            w = widths[col]\n        else:\n            sample = df[col].astype(str)\n            w = min(max(len(str(col)) + 2, sample.map(len).max() + 2 if len(sample) else 10), 60)\n        ws.column_dimensions[get_column_letter(i)].width = w\n\n\ndef write_excel(result: RunResult, out_path, source_name: str = \"\",\n                triage_md: str | None = None, dispositions: dict | None = None):\n    target = out_path if hasattr(out_path, \"write\") else Path(out_path)\n    wb = Workbook()\n\n    # ---------------- Summary ----------------\n    ws = wb.active\n    ws.title = \"Summary\"\n    ws[\"A1\"] = \"Journal Entry Risk Review\"\n    ws[\"A1\"].font = TITLE_FONT\n    meta = [\n        (\"Source file\", source_name or \"(in-memory)\"),\n        (\"Run timestamp\", datetime.now().strftime(\"%Y-%m-%d %H:%M\")),\n        (\"Period(s)\", result.stats[\"periods\"]),\n        (\"Total entries tested\", result.stats[\"total_entries\"]),\n        (\"Total lines tested\", result.stats[\"total_lines\"]),\n        (\"Entries flagged\", result.stats[\"flagged_entries\"]),\n        (\"Share of entries flagged\", f\"{result.stats['flagged_pct']}%\"),\n    ]\n    r = 3\n    for k, v in meta:\n        ws.cell(row=r, column=1, value=k).font = Font(name=FONT, bold=True, size=10)\n        ws.cell(row=r, column=2, value=v).font = BASE_FONT\n        r += 1\n\n    r += 1\n    ws.cell(row=r, column=1, value=\"Test results\").font = Font(name=FONT, bold=True, size=12, color=\"1F3864\")\n    r += 1\n    hdr = [\"Test\", \"Weight\", \"Ran?\", \"Entries flagged\", \"What it needs\"]\n    for i, h in enumerate(hdr, start=1):\n        ws.cell(row=r, column=i, value=h)\n    _style_header(ws, r, len(hdr))\n    head_row = r\n    r += 1\n    rs = result.rule_summary\n    for _, row in rs.iterrows():\n        ws.cell(row=r, column=1, value=row[\"label\"]).font = BASE_FONT\n        ws.cell(row=r, column=2, value=int(row[\"weight\"])).font = BASE_FONT\n        ws.cell(row=r, column=3, value=\"Yes\" if row[\"ran\"] else \"No \u2014 field missing\").font = BASE_FONT\n        # live formula counting this test's ID on the Exceptions sheet\n        ws.cell(row=r, column=4,\n                value=f'=COUNTIF(Exceptions!E:E,\"*\"&\"{row[\"rule_id\"]}\"&\"*\")').font = BASE_FONT\n        ws.cell(row=r, column=5, value=row[\"requires\"]).font = BASE_FONT\n        r += 1\n\n    r += 1\n    b = result.benford\n    ws.cell(row=r, column=1, value=\"Benford first-digit diagnostic (population)\").font = Font(name=FONT, bold=True, size=11, color=\"1F3864\")\n    r += 1\n    if b.get(\"mad\") is None:\n        ws.cell(row=r, column=1, value=b[\"verdict\"]).font = BASE_FONT\n        r += 1\n    else:\n        ws.cell(row=r, column=1, value=f\"Mean abs. deviation (MAD): {b['mad']}  \u2192  {b['verdict']}\").font = BASE_FONT\n        r += 1\n        ws.cell(row=r, column=1, value=f\"Based on {b['n']} line amounts \u2265 1. MAD bands per Nigrini: <0.006 close, <0.012 acceptable, <0.015 marginal, else investigate.\").font = NOTE_FONT\n        r += 1\n\n    r += 2\n    disclaimer = (\"These are RISK INDICATORS for auditor judgement, not findings of error or fraud. \"\n                  \"Expect false positives \u2014 percentile and round-amount tests in particular flag normal \"\n                  \"items. Investigate flagged entries; clear or document each. Tool runs entirely locally; \"\n                  \"no ledger data leaves this machine.\")\n    ws.cell(row=r, column=1, value=disclaimer).font = NOTE_FONT\n    ws.merge_cells(start_row=r, start_column=1, end_row=r, end_column=5)\n    ws.cell(row=r, column=1).alignment = Alignment(wrap_text=True, vertical=\"top\")\n    ws.row_dimensions[r].height = 60\n    for col, w in {\"A\": 30, \"B\": 9, \"C\": 18, \"D\": 16, \"E\": 40}.items():\n        ws.column_dimensions[col].width = w\n    ws.freeze_panes = \"A2\"\n\n    # ---------------- Exceptions ----------------\n    we = wb.create_sheet(\"Exceptions\")\n    cols = [\"je_id\", \"risk_score\", \"tests_fired\", \"test_ids\", \"reasons\",\n            \"entry_date\", \"period\", \"lines\", \"total_debit\", \"total_credit\",\n            \"net_amount\", \"entered_by\", \"approved_by\", \"source\", \"description\"]\n    nice = [\"JE ID\", \"Risk Score\", \"# Tests\", \"Test IDs\", \"Why Flagged\",\n            \"Entry Date\", \"Period\", \"Lines\", \"Total Debit\", \"Total Credit\",\n            \"Net\", \"Preparer\", \"Approver\", \"Source\", \"Description\"]\n    # NOTE: keep \"Test IDs\" at column E so the Summary COUNTIF(E:E,...) works.\n    df = result.entries.copy()\n    if df.empty:\n        df = pd.DataFrame(columns=cols)\n    df = df[cols]\n    # reorder so test_ids lands in column E (index 5): je_id,risk_score,tests_fired,reasons,test_ids,...\n    order = [\"je_id\", \"risk_score\", \"tests_fired\", \"reasons\", \"test_ids\",\n             \"entry_date\", \"period\", \"lines\", \"total_debit\", \"total_credit\",\n             \"net_amount\", \"entered_by\", \"approved_by\", \"source\", \"description\"]\n    nice = [\"JE ID\", \"Risk Score\", \"# Tests\", \"Why Flagged\", \"Test IDs\",\n            \"Entry Date\", \"Period\", \"Lines\", \"Total Debit\", \"Total Credit\",\n            \"Net\", \"Preparer\", \"Approver\", \"Source\", \"Description\"]\n    df = df[order].copy()\n    _dm = dispositions or {}\n    df[\"__disp\"] = df[\"je_id\"].map(lambda j: str((_dm.get(str(j)) or {}).get(\"disposition\", \"\") or \"\"))\n    df[\"__note\"] = df[\"je_id\"].map(lambda j: str((_dm.get(str(j)) or {}).get(\"note\", \"\") or \"\"))\n    order = order + [\"__disp\", \"__note\"]\n    nice = nice + [\"Disposition\", \"Auditor Note\"]\n    we.append(nice)\n    _style_header(we, 1, len(nice))\n    for _, row in df.iterrows():\n        vals = []\n        for c in order:\n            v = row[c]\n            if c == \"entry_date\" and pd.notna(v):\n                v = pd.Timestamp(v).strftime(\"%Y-%m-%d\")\n            vals.append(\"\" if pd.isna(v) else v)\n        we.append(vals)\n    for rr in range(2, we.max_row + 1):\n        for cc in range(1, len(nice) + 1):\n            we.cell(row=rr, column=cc).font = BASE_FONT\n            we.cell(row=rr, column=cc).alignment = Alignment(vertical=\"top\", wrap_text=(order[cc-1] in (\"reasons\", \"description\", \"__note\")))\n    for c in [\"I\", \"J\", \"K\"]:\n        for rr in range(2, we.max_row + 1):\n            we[f\"{c}{rr}\"].number_format = \"#,##0.00;(#,##0.00);-\"\n    if we.max_row >= 2:\n        we.conditional_formatting.add(\n            f\"B2:B{we.max_row}\",\n            ColorScaleRule(start_type=\"min\", start_color=\"FFFFFF\",\n                           end_type=\"max\", end_color=\"C00000\"))\n    widths = {\"JE ID\": 15, \"Risk Score\": 11, \"# Tests\": 9, \"Why Flagged\": 60,\n              \"Test IDs\": 22, \"Entry Date\": 12, \"Period\": 9, \"Lines\": 7,\n              \"Total Debit\": 14, \"Total Credit\": 14, \"Net\": 12, \"Preparer\": 12,\n              \"Approver\": 12, \"Source\": 10, \"Description\": 30, \"Disposition\": 18, \"Auditor Note\": 40}\n    for i, h in enumerate(nice, start=1):\n        we.column_dimensions[get_column_letter(i)].width = widths.get(h, 14)\n    we.freeze_panes = \"A2\"\n    we.auto_filter.ref = f\"A1:{get_column_letter(len(nice))}{max(we.max_row,1)}\"\n\n    # ---------------- Test Catalog ----------------\n    wc = wb.create_sheet(\"Test Catalog\")\n    chead = [\"Test ID\", \"Test\", \"Weight\", \"Scope-fields needed\", \"Ran?\", \"Description\"]\n    wc.append(chead)\n    _style_header(wc, 1, len(chead))\n    for _, row in result.rule_summary.iterrows():\n        wc.append([row[\"rule_id\"], row[\"label\"], int(row[\"weight\"]),\n                   row[\"requires\"], \"Yes\" if row[\"ran\"] else \"No\", row[\"description\"]])\n    for rr in range(2, wc.max_row + 1):\n        for cc in range(1, len(chead) + 1):\n            wc.cell(row=rr, column=cc).font = BASE_FONT\n            wc.cell(row=rr, column=cc).alignment = Alignment(vertical=\"top\", wrap_text=(cc == 6))\n    for col, w in {\"A\": 22, \"B\": 28, \"C\": 8, \"D\": 22, \"E\": 7, \"F\": 70}.items():\n        wc.column_dimensions[col].width = w\n    wc.freeze_panes = \"A2\"\n\n    # ---------------- Triage (optional) ----------------\n    if triage_md:\n        wt = wb.create_sheet(\"Triage\")\n        wt[\"A1\"] = \"Triage Notes\"\n        wt[\"A1\"].font = TITLE_FONT\n        row = 3\n        for line in triage_md.splitlines():\n            cell = wt.cell(row=row, column=1, value=line)\n            if line.startswith(\"## \"):\n                cell.value = line[3:]\n                cell.font = Font(name=FONT, bold=True, size=11, color=\"1F3864\")\n            elif line.startswith(\"# \"):\n                cell.value = line[2:]\n                cell.font = Font(name=FONT, bold=True, size=12)\n            elif line.startswith(\"**\") or line.startswith(\"_\"):\n                cell.font = Font(name=FONT, italic=line.startswith(\"_\"),\n                                 bold=line.startswith(\"**\"), size=10)\n            else:\n                cell.font = BASE_FONT\n            cell.alignment = Alignment(wrap_text=True, vertical=\"top\")\n            row += 1\n        wt.column_dimensions[\"A\"].width = 110\n        wt.freeze_panes = \"A2\"\n\n    wb.save(target)\n    return target\n\n\ndef write_csv(result: RunResult, out_path, dispositions: dict | None = None):\n    target = out_path if hasattr(out_path, \"write\") else Path(out_path)\n    df = result.entries.copy()\n    if dispositions:\n        df[\"disposition\"] = df[\"je_id\"].map(lambda j: str((dispositions.get(str(j)) or {}).get(\"disposition\", \"\") or \"\"))\n        df[\"auditor_note\"] = df[\"je_id\"].map(lambda j: str((dispositions.get(str(j)) or {}).get(\"note\", \"\") or \"\"))\n    df.to_csv(target, index=False)\n    return target\n",
  "jereview/triage.py": "\"\"\"\ntriage.py \u2014 Plain-English triage notes for the top exceptions.\n\nTwo modes:\n  local_triage()  \u2014 deterministic notes built from the fired tests. NO data\n                    leaves the machine. Always available; this is the default.\n  llm_triage()    \u2014 opt-in. Sends ONLY the flagged exception rows (never the\n                    full ledger) to an OpenAI/Anthropic model for a more fluent\n                    write-up. Requires an explicit provider + API key. Falls\n                    back to local_triage() on any error.\n\nTriage notes are investigative leads for auditor judgement, not conclusions.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\n\nimport pandas as pd\n\n# What an auditor should do when each test fires.\nSUGGESTED_PROCEDURE = {\n    \"WEEKEND_POSTING\": \"Confirm the business reason for a weekend posting; agree to support and approval.\",\n    \"AFTER_PERIOD_END\": \"Verify the entry belongs to the stated period and was not back-dated to shift results; check approval timing.\",\n    \"PERIOD_END_CONCENTRATION\": \"Assess whether late-period timing is normal cutoff or pressure to hit targets; review support.\",\n    \"OFFHOURS_POSTING\": \"Corroborate why the entry was posted outside business hours and that it ties to a legitimate process.\",\n    \"ROUND_AMOUNT\": \"Round amounts often signal estimates or plugs \u2014 trace to primary documentation, not a calculation.\",\n    \"BELOW_THRESHOLD\": \"Determine whether the amount was structured to stay under an approval level; look for split/related entries.\",\n    \"LARGE_OUTLIER\": \"Obtain and inspect primary support and approval at the appropriate authority level.\",\n    \"SELDOM_ACCOUNT\": \"Understand the purpose of a rarely-used account and confirm the entry is appropriate and properly classified.\",\n    \"SENSITIVE_ACCOUNT\": \"Scrutinize entries to suspense/reserve/equity/revenue/IC accounts \u2014 common manipulation vehicles.\",\n    \"MANUAL_SOURCE\": \"Manual entries bypass system controls \u2014 verify preparer authority, independent review, and support.\",\n    \"SOD_CONFLICT\": \"Same preparer and approver \u2014 treat as a control deficiency and obtain independent re-approval.\",\n    \"BLANK_DESCRIPTION\": \"Require a business rationale and support before clearing an undocumented entry.\",\n    \"SUSPICIOUS_KEYWORD\": \"Language like 'plug'/'to balance' suggests a forced entry \u2014 investigate what is being balanced and why.\",\n    \"UNBALANCED_ENTRY\": \"An out-of-balance entry indicates a posting/data error or partial entry \u2014 reconcile both sides before relying on it.\",\n}\n\nTRIAGE_FIELDS = [\"je_id\", \"risk_score\", \"tests_fired\", \"test_ids\", \"reasons\",\n                 \"entry_date\", \"period\", \"net_amount\", \"total_debit\",\n                 \"entered_by\", \"approved_by\", \"source\"]\n\n\ndef _top(entries: pd.DataFrame, top_n: int) -> pd.DataFrame:\n    if entries.empty:\n        return entries\n    cols = [c for c in TRIAGE_FIELDS if c in entries.columns]\n    return entries.head(top_n)[cols].copy()\n\n\ndef local_triage(entries: pd.DataFrame, top_n: int = 10) -> str:\n    \"\"\"Deterministic triage notes \u2014 no data leaves the machine.\"\"\"\n    if entries.empty:\n        return \"No exceptions were flagged.\"\n    top = _top(entries, top_n)\n    lines = [f\"# Triage notes \u2014 top {len(top)} exception(s)\", \"\",\n             \"_Investigative leads for auditor judgement, not conclusions. Generated locally; no data left this machine._\", \"\"]\n    for _, r in top.iterrows():\n        ed = r.get(\"entry_date\")\n        ed = pd.Timestamp(ed).strftime(\"%Y-%m-%d\") if pd.notna(ed) else \"\u2014\"\n        lines.append(f\"## {r['je_id']}  \u00b7  risk {int(r['risk_score'])}  \u00b7  {int(r['tests_fired'])} test(s)\")\n        lines.append(f\"Entry date {ed}, period {r.get('period','\u2014')}, net ${float(r.get('net_amount',0)):,.2f}, \"\n                     f\"preparer {r.get('entered_by') or '\u2014'}, approver {r.get('approved_by') or '\u2014'}, source {r.get('source') or '\u2014'}.\")\n        lines.append(f\"**Why flagged:** {r['reasons']}\")\n        procs = []\n        for tid in str(r[\"test_ids\"]).split(\", \"):\n            p = SUGGESTED_PROCEDURE.get(tid)\n            if p and p not in procs:\n                procs.append(p)\n        lines.append(\"**Suggested procedures:**\")\n        for p in procs:\n            lines.append(f\"- {p}\")\n        lines.append(\"\")\n    return \"\\n\".join(lines)\n\n\ndef build_payload(entries: pd.DataFrame, top_n: int) -> list[dict]:\n    \"\"\"Compact, flagged-rows-only payload for the LLM. Never the full ledger.\"\"\"\n    top = _top(entries, top_n)\n    recs = []\n    for _, r in top.iterrows():\n        ed = r.get(\"entry_date\")\n        recs.append({\n            \"je_id\": r[\"je_id\"],\n            \"risk_score\": int(r[\"risk_score\"]),\n            \"tests\": str(r[\"test_ids\"]),\n            \"reasons\": str(r[\"reasons\"]),\n            \"entry_date\": pd.Timestamp(ed).strftime(\"%Y-%m-%d\") if pd.notna(ed) else None,\n            \"period\": r.get(\"period\"),\n            \"net_amount\": float(r.get(\"net_amount\", 0)),\n            \"preparer\": r.get(\"entered_by\"),\n            \"approver\": r.get(\"approved_by\"),\n            \"source\": r.get(\"source\"),\n        })\n    return recs\n\n\n_SYSTEM = (\n    \"You are a senior internal auditor writing concise triage notes on flagged \"\n    \"journal entries. For each entry, in 2-3 sentences: state the risk, what \"\n    \"specifically to check, and how urgent it is. Then add a short overall \"\n    \"paragraph. These are investigative leads, not conclusions \u2014 do not assert \"\n    \"that fraud or error has occurred. Output GitHub-flavored markdown.\"\n)\n\n\ndef llm_triage(entries: pd.DataFrame, top_n: int, provider: str, model: str,\n               api_key: str) -> tuple[str, bool]:\n    \"\"\"\n    Opt-in AI triage. Returns (markdown, used_ai). Sends ONLY flagged rows.\n    Falls back to local_triage on any error (used_ai=False).\n    \"\"\"\n    if entries.empty:\n        return \"No exceptions were flagged.\", False\n    if not api_key:\n        return local_triage(entries, top_n), False\n\n    payload = build_payload(entries, top_n)\n    user = (\"Write triage notes for these flagged journal entries (JSON below). \"\n            \"These are the only records shared with you.\\n\\n\" + json.dumps(payload, indent=2))\n    try:\n        import httpx\n        if provider.lower() == \"anthropic\":\n            resp = httpx.post(\n                \"https://api.anthropic.com/v1/messages\",\n                headers={\"x-api-key\": api_key, \"anthropic-version\": \"2023-06-01\",\n                         \"content-type\": \"application/json\"},\n                json={\"model\": model, \"max_tokens\": 2000, \"system\": _SYSTEM,\n                      \"messages\": [{\"role\": \"user\", \"content\": user}]},\n                timeout=120,\n            )\n            resp.raise_for_status()\n            text = \"\".join(b.get(\"text\", \"\") for b in resp.json().get(\"content\", [])\n                           if b.get(\"type\") == \"text\")\n        else:  # openai-compatible\n            resp = httpx.post(\n                \"https://api.openai.com/v1/chat/completions\",\n                headers={\"Authorization\": f\"Bearer {api_key}\"},\n                json={\"model\": model, \"temperature\": 0, \"max_tokens\": 2000,\n                      \"messages\": [{\"role\": \"system\", \"content\": _SYSTEM},\n                                   {\"role\": \"user\", \"content\": user}]},\n                timeout=120,\n            )\n            resp.raise_for_status()\n            text = resp.json()[\"choices\"][0][\"message\"][\"content\"]\n        header = \"_AI-generated triage. Only the flagged exception rows above were sent; the full ledger was not._\\n\\n\"\n        return header + text, True\n    except Exception as e:  # noqa: BLE001\n        return (f\"_AI triage unavailable ({e}); showing local notes instead._\\n\\n\"\n                + local_triage(entries, top_n)), False\n",
  "jereview/pipeline.py": "\"\"\"\npipeline.py \u2014 One call that the UI (or any caller) uses: take a raw export\nframe, run the full review, and return everything needed to render and download.\nFramework-agnostic and headlessly testable.\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom dataclasses import dataclass\n\nimport pandas as pd\n\nfrom .schema import ColumnMapping, normalize\nfrom .rules import RuleContext\nfrom .engine import run, RunResult\nfrom .report import write_excel, write_csv\nfrom .triage import local_triage, llm_triage\n\n\n@dataclass\nclass Output:\n    result: RunResult\n    triage_md: str | None\n    used_ai: bool\n    xlsx_bytes: bytes\n    csv_bytes: bytes\n\n\ndef run_pipeline(raw_df: pd.DataFrame, *, mapping: dict | None = None,\n                 threshold: float | None = None, triage: str = \"none\",\n                 top_n: int = 10, provider: str = \"anthropic\",\n                 model: str = \"claude-sonnet-4-20250514\", api_key: str = \"\",\n                 source_name: str = \"upload\") -> Output:\n    cm = ColumnMapping(mapping=mapping) if mapping else ColumnMapping.identity(list(raw_df.columns))\n    df = normalize(raw_df, cm)\n\n    ctx = RuleContext(available=set())\n    if threshold is not None:\n        ctx.approval_threshold = threshold\n    result = run(df, ctx)\n\n    triage_md, used_ai = None, False\n    if triage == \"local\":\n        triage_md = local_triage(result.entries, top_n)\n    elif triage == \"ai\":\n        triage_md, used_ai = llm_triage(result.entries, top_n, provider, model, api_key)\n\n    import io\n    xbuf, cbuf = io.BytesIO(), io.StringIO()\n    write_excel(result, xbuf, source_name=source_name, triage_md=triage_md)\n    write_csv(result, cbuf)\n    xlsx_bytes = xbuf.getvalue()\n    csv_bytes = cbuf.getvalue().encode(\"utf-8\")\n\n    return Output(result=result, triage_md=triage_md, used_ai=used_ai,\n                  xlsx_bytes=xlsx_bytes, csv_bytes=csv_bytes)\n\n\ndef workpaper_bytes(result: RunResult, *, source_name: str = \"upload\",\n                    triage_md: str | None = None, dispositions: dict | None = None):\n    \"\"\"Regenerate the Excel + CSV workpaper bytes from a RunResult, optionally\n    folding in auditor dispositions. Used by the UI to refresh downloads after\n    the reviewer edits dispositions, without re-running the engine.\"\"\"\n    import io\n    xbuf, cbuf = io.BytesIO(), io.StringIO()\n    write_excel(result, xbuf, source_name=source_name, triage_md=triage_md, dispositions=dispositions)\n    write_csv(result, cbuf, dispositions=dispositions)\n    return xbuf.getvalue(), cbuf.getvalue().encode(\"utf-8\")\n",
  "jereview/webapp.py": "\"\"\"\nwebapp.py \u2014 Shared Streamlit UI body, used by both the native app and the\nin-browser (stlite) build.\n\nrender(allow_ai): when allow_ai is False (the in-browser build) the AI-triage\noption is hidden, so no network egress is possible and httpx is never imported.\n\nFlow: a run is stored in session_state so the flagged table stays interactive\nacross reruns. The reviewer dispositions each entry in an editable table and\nthose dispositions flow straight into the downloaded workpaper \u2014 all locally.\nKept free of version-specific Streamlit kwargs (e.g. no use_container_width) so\nit runs on the older Streamlit that ships inside stlite as well as a current\nlocal install.\n\"\"\"\n\nfrom __future__ import annotations\n\nimport json\nfrom pathlib import Path\n\nimport pandas as pd\nimport streamlit as st\n\nfrom jereview.pipeline import run_pipeline, workpaper_bytes\nfrom jereview.schema import NormalizationError\n\nDISPOSITIONS = [\"\", \"Confirmed exception\", \"Cleared \u2013 no issue\", \"Follow-up\", \"Not tested\"]\n\n\ndef render(allow_ai: bool = True) -> None:\n    st.set_page_config(page_title=\"JE Risk Review\", page_icon=\"\ud83e\uddfe\", layout=\"wide\")\n    st.title(\"\ud83e\uddfe Journal Entry Risk Review\")\n    if allow_ai:\n        st.caption(\"Runs on this machine. Your ledger does not leave it unless you turn on AI triage below.\")\n    else:\n        st.caption(\"Runs entirely in your browser. Your ledger never leaves this computer \u2014 nothing is uploaded to any server.\")\n\n    with st.sidebar:\n        st.header(\"Options\")\n        threshold = st.number_input(\"Approval threshold ($)\", min_value=0, value=50000, step=1000,\n                                    help=\"Used by the 'just below threshold' test.\")\n        st.divider()\n        triage_choices = [\"None\", \"Local (no data leaves)\"]\n        if allow_ai:\n            triage_choices.append(\"AI-enhanced (sends flagged rows)\")\n        triage_mode = st.radio(\"Triage notes\", triage_choices, index=1)\n        top_n = st.slider(\"Triage how many top exceptions\", 1, 25, 10)\n        provider = model = api_key = None\n        if allow_ai and triage_mode.startswith(\"AI\"):\n            st.warning(\"AI triage sends the **flagged exception rows** (not the full ledger) \"\n                       \"to the provider you choose. Leave this off if any data is sensitive.\")\n            provider = st.selectbox(\"Provider\", [\"anthropic\", \"openai\"])\n            model = st.text_input(\"Model\",\n                                  value=\"claude-sonnet-4-20250514\" if provider == \"anthropic\" else \"gpt-4o\")\n            api_key = st.text_input(\"API key\", type=\"password\")\n        st.divider()\n        map_file = st.file_uploader(\"Column mapping (JSON, optional)\", type=[\"json\"],\n                                    help=\"Only if your export's column names differ from the canonical schema.\")\n\n    uploaded = st.file_uploader(\"Upload a journal-entry export (.csv or .xlsx)\", type=[\"csv\", \"xlsx\", \"xlsm\"])\n    run_clicked = st.button(\"Run review\", type=\"primary\")\n\n    # ---- run (only when the button is pressed) -> stash results in session ----\n    if run_clicked:\n        if uploaded is None:\n            st.warning(\"Upload a journal-entry file first, then click Run review.\")\n        else:\n            try:\n                if uploaded.name.lower().endswith((\".xlsx\", \".xlsm\")):\n                    raw = pd.read_excel(uploaded, dtype=str)\n                else:\n                    raw = pd.read_csv(uploaded, dtype=str)\n            except Exception as e:  # noqa: BLE001\n                st.error(f\"Could not read the file: {e}\")\n                return\n\n            mapping = None\n            if map_file is not None:\n                try:\n                    data = json.load(map_file)\n                    mapping = data.get(\"mapping\", data)\n                except Exception as e:  # noqa: BLE001\n                    st.error(f\"Could not read the mapping file: {e}\")\n                    return\n\n            mode = {\"None\": \"none\", \"Local (no data leaves)\": \"local\",\n                    \"AI-enhanced (sends flagged rows)\": \"ai\"}[triage_mode]\n            try:\n                with st.spinner(\"Running risk tests\u2026\"):\n                    out = run_pipeline(raw, mapping=mapping, threshold=float(threshold),\n                                       triage=mode, top_n=top_n, provider=provider or \"anthropic\",\n                                       model=model or \"claude-sonnet-4-20250514\",\n                                       api_key=api_key or \"\", source_name=uploaded.name)\n            except NormalizationError as e:\n                st.error(f\"Mapping problem: {e}\")\n                return\n\n            st.session_state[\"jr_result\"] = out.result\n            st.session_state[\"jr_triage_md\"] = out.triage_md\n            st.session_state[\"jr_used_ai\"] = out.used_ai\n            st.session_state[\"jr_source\"] = uploaded.name\n            st.session_state.pop(\"jr_disp\", None)   # fresh run clears prior dispositions\n\n    if \"jr_result\" not in st.session_state:\n        return\n\n    result = st.session_state[\"jr_result\"]\n    triage_md = st.session_state.get(\"jr_triage_md\")\n    used_ai = st.session_state.get(\"jr_used_ai\", False)\n    source = st.session_state.get(\"jr_source\", \"upload\")\n\n    # ---- headline metrics ----\n    s = result.stats\n    c1, c2, c3, c4 = st.columns(4)\n    c1.metric(\"Entries tested\", s[\"total_entries\"])\n    c2.metric(\"Lines tested\", s[\"total_lines\"])\n    c3.metric(\"Entries flagged\", s[\"flagged_entries\"])\n    c4.metric(\"Flagged %\", f\"{s['flagged_pct']}%\")\n\n    if result.skipped_rules:\n        st.info(\"Tests skipped (your export is missing the fields they need): \"\n                + \", \".join(result.skipped_rules))\n\n    b = result.benford\n    if b.get(\"mad\") is not None:\n        st.caption(f\"Benford first-digit MAD {b['mad']} \u2192 {b['verdict']} (n={b['n']}).\")\n\n    # ---- flagged entries: review & disposition ----\n    st.subheader(\"Flagged entries \u2014 review & disposition\")\n    dispositions: dict = {}\n    if result.entries.empty:\n        st.success(\"No exceptions flagged.\")\n    else:\n        st.caption(\"Mark each entry and add a note. Your dispositions flow straight into the \"\n                   \"workpaper you download below \u2014 nothing leaves your browser.\")\n        base = result.entries[[\"je_id\", \"risk_score\", \"tests_fired\", \"test_ids\",\n                               \"entry_date\", \"net_amount\", \"entered_by\", \"reasons\"]].copy()\n        base[\"entry_date\"] = base[\"entry_date\"].apply(\n            lambda v: pd.Timestamp(v).strftime(\"%Y-%m-%d\") if pd.notna(v) else \"\")\n        base[\"Disposition\"] = \"\"\n        base[\"Auditor note\"] = \"\"\n        prev = st.session_state.get(\"jr_disp\")\n        if prev is not None and not prev.empty:\n            m = prev.set_index(\"je_id\")\n            base[\"Disposition\"] = base[\"je_id\"].map(m[\"Disposition\"]).fillna(\"\")\n            base[\"Auditor note\"] = base[\"je_id\"].map(m[\"Auditor note\"]).fillna(\"\")\n\n        readonly = [c for c in base.columns if c not in (\"Disposition\", \"Auditor note\")]\n        try:\n            cfg = {\n                \"Disposition\": st.column_config.SelectboxColumn(\"Disposition\", options=DISPOSITIONS),\n                \"Auditor note\": st.column_config.TextColumn(\"Auditor note\"),\n                \"reasons\": st.column_config.TextColumn(\"Why flagged\", width=\"large\"),\n            }\n            edited = st.data_editor(base, hide_index=True, disabled=readonly, column_config=cfg)\n        except Exception:  # older Streamlit without column_config\n            edited = st.data_editor(base, hide_index=True)\n\n        edited = edited.fillna(\"\")\n        st.session_state[\"jr_disp\"] = edited[[\"je_id\", \"Disposition\", \"Auditor note\"]].copy()\n        done = int((edited[\"Disposition\"].astype(str).str.len() > 0).sum())\n        st.caption(f\"{done} of {len(edited)} flagged entries dispositioned.\")\n\n        for _, rr in edited.iterrows():\n            d = str(rr.get(\"Disposition\", \"\")).strip()\n            n = str(rr.get(\"Auditor note\", \"\")).strip()\n            if d or n:\n                dispositions[str(rr[\"je_id\"])] = {\"disposition\": d, \"note\": n}\n\n    # ---- downloads (regenerated to include current dispositions) ----\n    xlsx_bytes, csv_bytes = workpaper_bytes(result, source_name=source,\n                                            triage_md=triage_md, dispositions=dispositions)\n    d1, d2 = st.columns(2)\n    d1.download_button(\"\u2b07\ufe0f Download Excel workpaper\", xlsx_bytes,\n                       file_name=Path(source).stem + \"_exceptions.xlsx\",\n                       mime=\"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet\")\n    d2.download_button(\"\u2b07\ufe0f Download CSV\", csv_bytes,\n                       file_name=Path(source).stem + \"_exceptions.csv\", mime=\"text/csv\")\n\n    if triage_md:\n        st.subheader(\"Triage notes\" + (\"  \u00b7  AI-generated\" if used_ai else \"  \u00b7  local\"))\n        st.markdown(triage_md)\n\n    st.caption(\"Exceptions are leads for auditor judgement, not findings. Investigate and document each.\")\n"
};
mount(
  { requirements: ["pandas", "openpyxl"], entrypoint: "app.py", files },
  document.getElementById("root"),
);
</script>
